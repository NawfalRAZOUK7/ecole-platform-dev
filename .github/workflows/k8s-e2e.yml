name: Kubernetes E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  k8s-e2e:
    name: Kubernetes E2E Tests (Kind)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: ecole-k8s-test
          config: infra/k8s/kind-config.yaml
          wait: 120s

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            npm-

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements-test.txt

      - name: Install web dependencies
        run: |
          cd web
          npm ci

      - name: Build Docker images
        run: |
          docker build -t ecole-backend:test ./backend
          docker build -t ecole-web:test ./web

      - name: Load images into Kind
        run: |
          kind load docker-image ecole-backend:test --name ecole-k8s-test
          kind load docker-image ecole-web:test --name ecole-k8s-test

      - name: Install Postgres and Redis in Kind
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm install postgres bitnami/postgresql -n ecole-test --create-namespace --set auth.username=ecole --set auth.password=ecole --set auth.database=ecole_platform --set primary.service.ports.postgresql=5432
          helm install redis bitnami/redis -n ecole-test --set auth.enabled=false

      - name: Wait for Postgres and Redis
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=postgresql -n ecole-test --timeout=120s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=redis -n ecole-test --timeout=60s

      - name: Get Postgres and Redis connection strings
        run: |
          POSTGRES_HOST=$(kubectl get svc postgres-postgresql -n ecole-test -o jsonpath='{.spec.clusterIP}')
          REDIS_HOST=$(kubectl get svc redis-master -n ecole-test -o jsonpath='{.spec.clusterIP}')
          echo "DATABASE_URL=postgresql+asyncpg://ecole:ecole@${POSTGRES_HOST}:5432/ecole_platform" >> $GITHUB_ENV
          echo "REDIS_URL=redis://${REDIS_HOST}:6379/0" >> $GITHUB_ENV
          echo "POSTGRES_HOST=${POSTGRES_HOST}" >> $GITHUB_ENV
          echo "REDIS_HOST=${REDIS_HOST}" >> $GITHUB_ENV

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic ecole-database-url -n ecole-test --from-literal=DATABASE_URL="${DATABASE_URL}"
          kubectl create secret generic ecole-redis-url -n ecole-test --from-literal=REDIS_URL="${REDIS_URL}"
          kubectl create secret generic ecole-jwt-secret -n ecole-test --from-literal=JWT_SECRET_KEY="test-secret-key-ci-only"
          kubectl create secret generic ecole-smtp-password -n ecole-test --from-literal=SMTP_PASSWORD=""

      - name: Deploy with Helm
        run: |
          helm upgrade --install ecole-platform ./infra/k8s \
            -n ecole-test \
            -f ./infra/k8s/values-staging.yaml \
            --set namespace.create=false \
            --set namespace.name=ecole-test \
            --set images.backend.repository=ecole-backend \
            --set images.backend.tag=test \
            --set images.web.repository=ecole-web \
            --set images.web.tag=test \
            --set backend.secrets.databaseUrl=ecole-database-url \
            --set backend.secrets.redisUrl=ecole-redis-url \
            --set backend.secrets.jwtSecretKey=ecole-jwt-secret \
            --set backend.secrets.smtpPassword=ecole-smtp-password \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          # Release name "ecole-platform" equals chart name → fullname is ecole-platform (see _helpers.tpl)
          kubectl rollout status deployment/ecole-platform-backend -n ecole-test --timeout=180s
          kubectl rollout status deployment/ecole-platform-web -n ecole-test --timeout=120s

      - name: Run backend health check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(kubectl exec -n ecole-test deploy/ecole-platform-backend -- python -c "import httpx; print(httpx.get('http://localhost:8000/api/v1/health').status_code)" 2>/dev/null || echo "0")
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Backend health check failed after 30 attempts"
          exit 1

      - name: Run API contract tests against Kubernetes
        env:
          TEST_REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          # Port-forward to backend
          kubectl port-forward -n ecole-test svc/ecole-platform-backend 8000:8000 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          sleep 5

          # Run contract tests
          pytest tests/contract/test_api_contracts_envelope.py -v --tb=short

      - name: Get pod logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n ecole-test -o wide || true
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n ecole-test || true
          echo "=== Backend Pod Logs ==="
          kubectl logs -n ecole-test -l app.kubernetes.io/component=backend -c migrate --tail=100 || true
          kubectl logs -n ecole-test -l app.kubernetes.io/component=backend -c backend --tail=100 || true
          echo "=== Web Pod Logs ==="
          kubectl logs -n ecole-test -l app.kubernetes.io/component=web --tail=100 || true
          echo "=== Postgres Logs ==="
          kubectl logs -n ecole-test -l app.kubernetes.io/name=postgresql --tail=50 || true
          echo "=== Redis Logs ==="
          kubectl logs -n ecole-test -l app.kubernetes.io/name=redis --tail=50 || true

      - name: Cleanup Kind cluster
        if: always()
        run: |
          kind delete cluster --name ecole-k8s-test
