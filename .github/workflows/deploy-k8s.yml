name: Deploy to Kubernetes

on:
  push:
    branches:
      - main      # → production
      - develop   # → staging

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "version=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Build web image
      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "namespace=ecole-prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
            echo "namespace=ecole-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ steps.env.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        run: |
          helm upgrade --install ecole-platform ./infra/k8s \
            -n ${{ steps.env.outputs.namespace }} \
            -f ./infra/k8s/values-${{ steps.env.outputs.env }}.yaml \
            --set images.backend.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set images.web.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set images.backend.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend \
            --set images.web.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web \
            --wait \
            --timeout 5m

      - name: Verify rollout — backend
        run: |
          kubectl rollout status deployment/ecole-platform-ecole-platform-backend \
            -n ${{ steps.env.outputs.namespace }} \
            --timeout=180s

      - name: Verify rollout — web
        run: |
          kubectl rollout status deployment/ecole-platform-ecole-platform-web \
            -n ${{ steps.env.outputs.namespace }} \
            --timeout=120s

      - name: Post-deploy health check
        run: |
          # Wait for the backend to be healthy
          for i in $(seq 1 30); do
            STATUS=$(kubectl exec -n ${{ steps.env.outputs.namespace }} \
              deploy/ecole-platform-ecole-platform-backend -- \
              python -c "import httpx; print(httpx.get('http://localhost:8000/api/v1/health').status_code)" 2>/dev/null || echo "0")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back"
          helm rollback ecole-platform 0 \
            -n ${{ steps.env.outputs.namespace }} \
            --wait --timeout 3m
          echo "Rollback complete"
