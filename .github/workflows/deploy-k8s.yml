name: Deploy to Kubernetes

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - main # → production
      - develop # → staging

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_prefix: ${{ steps.meta.outputs.image_prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          echo "version=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "image_prefix=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_prefix }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_prefix }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Build web image
      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_prefix }}/web:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_prefix }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deployment credentials
        id: deployment-credentials
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "${KUBE_CONFIG_B64:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping Kubernetes deploy::KUBE_CONFIG is not configured for this environment."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Helm
        if: steps.deployment-credentials.outputs.enabled == 'true'
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Set up kubectl
        if: steps.deployment-credentials.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        if: steps.deployment-credentials.outputs.enabled == 'true'
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          if ! printf '%s' "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"; then
            echo "::error title=Invalid KUBE_CONFIG secret::KUBE_CONFIG must be a valid base64-encoded kubeconfig file."
            exit 1
          fi

          chmod 600 "$HOME/.kube/config"
          kubectl config current-context

      - name: Determine environment
        if: steps.deployment-credentials.outputs.enabled == 'true'
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "namespace=ecole-prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
            echo "namespace=ecole-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Create namespace if not exists
        if: steps.deployment-credentials.outputs.enabled == 'true'
        run: |
          kubectl create namespace ${{ steps.env.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Doppler CLI
        if: steps.deployment-credentials.outputs.enabled == 'true'
        run: |
          curl -sLf --compressed "https://cli.doppler.com/install.sh" | sh
          doppler --version

      - name: Sync Doppler secrets to Kubernetes
        if: steps.deployment-credentials.outputs.enabled == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          NAMESPACE: ${{ steps.env.outputs.namespace }}
        run: |
          # Determine Doppler config from branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            DOPPLER_CONFIG="prd_main"
          else
            DOPPLER_CONFIG="stg_main"
          fi

          echo "Syncing secrets from Doppler config: $DOPPLER_CONFIG"

          # Download as JSON and pipe directly to a Python script that creates
          # Kubernetes secrets without writing secrets to disk or exporting to shell env.
          doppler secrets download --token "$DOPPLER_TOKEN" \
            --config "$DOPPLER_CONFIG" --no-file --format json | python3 -c '
          import json, sys, subprocess, os
          secrets = json.load(sys.stdin)
          ns = os.environ["NAMESPACE"]
          keys = ["DATABASE_URL", "REDIS_URL", "JWT_SECRET_KEY", "SMTP_PASSWORD"]
          for key in keys:
              val = secrets.get(key, {}).get("computed", "")
              secret_name = f"ecole-{key.lower().replace("_", "-")}"
              if key == "SMTP_PASSWORD":
                  secret_name = "ecole-smtp-password"
              if key == "JWT_SECRET_KEY":
                  secret_name = "ecole-jwt-secret"
              yaml = subprocess.run(
                  [
                      "kubectl", "create", "secret", "generic", secret_name,
                      "-n", ns,
                      f"--from-literal={key}={val}",
                      "--dry-run=client", "-o", "yaml",
                  ],
                  stdout=subprocess.PIPE, check=True,
              ).stdout
              subprocess.run(
                  ["kubectl", "apply", "-n", ns, "-f", "-"],
                  input=yaml,
                  check=True,
              )
              print(f"Secret {secret_name} created/updated")
          '
          echo "Secrets synced successfully"

      - name: Helm upgrade
        if: steps.deployment-credentials.outputs.enabled == 'true'
        run: |
          helm upgrade --install ecole-platform ./infra/k8s \
            -n ${{ steps.env.outputs.namespace }} \
            -f ./infra/k8s/values-${{ steps.env.outputs.env }}.yaml \
            --set images.backend.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set images.web.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set images.backend.repository=${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_prefix }}/backend \
            --set images.web.repository=${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_prefix }}/web \
            --wait \
            --timeout 5m

      - name: Verify rollout — backend
        if: steps.deployment-credentials.outputs.enabled == 'true'
        run: |
          kubectl rollout status deployment/ecole-platform-backend \
            -n ${{ steps.env.outputs.namespace }} \
            --timeout=180s

      - name: Verify rollout — web
        if: steps.deployment-credentials.outputs.enabled == 'true'
        run: |
          kubectl rollout status deployment/ecole-platform-web \
            -n ${{ steps.env.outputs.namespace }} \
            --timeout=120s

      - name: Post-deploy health check
        if: steps.deployment-credentials.outputs.enabled == 'true'
        run: |
          kubectl port-forward \
            -n ${{ steps.env.outputs.namespace }} \
            deploy/ecole-platform-backend \
            18000:8000 &
          PF_PID=$!
          sleep 3
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18000/api/v1/health; then
              echo "Health check passed on attempt $i"
              kill $PF_PID 2>/dev/null || true
              exit 0
            fi
            echo "Attempt $i: not healthy yet, waiting 5s..."
            sleep 5
          done
          kill $PF_PID 2>/dev/null || true
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.deployment-credentials.outputs.enabled == 'true' && steps.env.outputs.namespace != ''
        run: |
          echo "Deployment failed — rolling back"
          helm rollback ecole-platform 0 \
            -n ${{ steps.env.outputs.namespace }} \
            --wait --timeout 3m
          echo "Rollback complete"
