name: Web CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - "backend/docs/openapi.json"
      - "backend/openapi.json"
      - "backend/scripts/export_openapi.py"
      - "scripts/generate-openapi.sh"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "backend/docs/openapi.json"
      - "backend/openapi.json"
      - "backend/scripts/export_openapi.py"
      - "scripts/generate-openapi.sh"
      - ".github/workflows/web-ci.yml"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: web/node_modules
          key: "node-modules-${{ hashFiles('web/package-lock.json') }}"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: web/node_modules
          key: "node-modules-${{ hashFiles('web/package-lock.json') }}"
      - run: npm ci
      - run: npm run test -- --reporter=default --reporter=junit --outputFile=test-results.xml
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: web/test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: web/coverage/

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: web/node_modules
          key: "node-modules-${{ hashFiles('web/package-lock.json') }}"
      - run: npm ci
      - run: npm run build
      - name: Check bundle sizes
        run: |
          MAX_SIZE=307200  # 300KB
          for f in dist/assets/*.js; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "WARNING: $(basename "$f") is $(($size/1024))KB (limit 300KB)"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: web/dist/
