name: Deploy API Docs

on:
  push:
    branches:
      - main
    paths:
      - backend/app/**
      - backend/scripts/export_openapi.py
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/configure-pages@v6
        id: pages
        continue-on-error: true

      - name: Skip deploy when Pages is disabled
        if: steps.pages.outcome != 'success'
        run: echo "GitHub Pages is not enabled for this repository; skipping docs deployment."

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Export OpenAPI spec
        run: |
          cd backend
          python scripts/export_openapi.py

      - name: Generate Redoc static site
        run: |
          mkdir -p docs/site
          cp backend/docs/openapi.json docs/openapi.json
          npx @redocly/cli build-docs docs/openapi.json -o docs/site/index.html

      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outcome == 'success'
        with:
          path: docs/site

      - uses: actions/deploy-pages@v4
        id: deployment
        if: steps.pages.outcome == 'success'
