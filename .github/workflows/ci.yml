# CI Pipeline — École Platform
#
# Reference: S-125 — CI pipeline, EP-08 Testing & Quality
# Stages: lint → security → unit → integration → contract → security-runtime → coverage

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Check migration branch conflicts
        run: |
          cd backend
          heads=$(alembic heads | wc -l)
          if [ "$heads" -gt 1 ]; then
            echo "ERROR: Multiple migration heads detected — merge required"
            alembic heads
            exit 1
          fi

      - name: Ruff check (lint)
        run: |
          cd backend
          ruff check app/ tests/

      - name: Ruff format check
        run: |
          cd backend
          ruff format --check app/ tests/

      - name: OpenAPI spec drift check (Phase 3A)
        run: |
          cd backend
          python scripts/export_openapi.py --check

  security-trivy:
    name: Security - Trivy
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ecole-backend:ci ./backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecole-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  security-pip-audit:
    name: Security - pip-audit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --strict

  security-bandit:
    name: Security - Bandit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install Bandit
        run: pip install "bandit[toml]"

      - name: Run Bandit
        run: bandit -r backend/app/ -c backend/pyproject.toml -f json -o bandit-report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  migration-safety:
    name: Migration Safety
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ecole_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d ecole_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/ecole_migration_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Alembic changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            alembic:
              - 'backend/alembic/**'

      - name: Skip when no Alembic files changed
        if: steps.changes.outputs.alembic != 'true'
        run: echo "No Alembic changes detected; skipping migration safety checks."

      - name: Set up Python
        if: steps.changes.outputs.alembic == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        if: steps.changes.outputs.alembic == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Forward migration
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          alembic upgrade head

      - name: Verify downgrade reversibility
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          alembic downgrade base

      - name: Re-apply to confirm idempotency
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          alembic upgrade head

  unit-tests:
    name: Unit Tests (Py ${{ matrix.python-version }}, PG ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        postgres-version: ["15", "16", "17"]
    env:
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          cd backend
          UNIT_COVERAGE_FILES='app/core/exceptions.py,app/core/permissions.py,app/core/response.py,app/core/security.py'
          coverage erase
          coverage run --parallel-mode --source=app -m pytest tests/test_unit_*.py -v --tb=short
          coverage combine
          coverage report --include="$UNIT_COVERAGE_FILES" --fail-under=95
          coverage xml -o coverage-unit.xml --include="$UNIT_COVERAGE_FILES"

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit-${{ matrix.python-version }}-pg${{ matrix.postgres-version }}
          path: backend/coverage-unit.xml

      - name: Upload unit coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-unit-${{ matrix.python-version }}-pg${{ matrix.postgres-version }}
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

  integration-tests:
    name: Integration Tests (Py ${{ matrix.python-version }}, PG ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        postgres-version: ["15", "16", "17"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecole -d ecole_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Seed test data
        run: |
          cd backend
          python -m app.seed

      - name: Run integration tests
        run: |
          cd backend
          coverage erase
          coverage run --parallel-mode --source=app -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          cleanup() {
            kill -INT "$SERVER_PID" || true
            wait "$SERVER_PID" || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done
          pytest tests/test_auth.py tests/test_phase3.py -v --tb=short
          kill -INT "$SERVER_PID" || true
          wait "$SERVER_PID" || true
          trap - EXIT

      - name: Upload integration coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-integration-${{ matrix.python-version }}-pg${{ matrix.postgres-version }}
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecole -d ecole_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run migrations + seed
        run: |
          cd backend
          alembic upgrade head
          python -m app.seed

      - name: Run contract tests with API coverage
        run: |
          cd backend
          coverage erase
          coverage run --parallel-mode --source=app -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          cleanup() {
            kill -INT "$SERVER_PID" || true
            wait "$SERVER_PID" || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done
          pytest tests/test_contract.py -v --tb=short
          kill -INT "$SERVER_PID" || true
          wait "$SERVER_PID" || true
          trap - EXIT

      - name: Upload contract coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-contract
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

  security-tests:
    name: RBAC Security Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecole -d ecole_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run migrations + seed
        run: |
          cd backend
          alembic upgrade head
          python -m app.seed

      - name: Run RBAC security tests with API coverage
        run: |
          cd backend
          coverage erase
          coverage run --parallel-mode --source=app -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          cleanup() {
            kill -INT "$SERVER_PID" || true
            wait "$SERVER_PID" || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done
          pytest tests/test_rbac_security.py -v --tb=short
          kill -INT "$SERVER_PID" || true
          wait "$SERVER_PID" || true
          trap - EXIT

      - name: Upload RBAC coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-security
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs:
      [
        unit-tests,
        integration-tests,
        contract-tests,
        security-tests,
        e2e-tests,
        security-audit,
        load-tests,
      ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Download backend coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          path: backend/coverage-artifacts
          merge-multiple: true

      - name: Build combined backend coverage report
        run: |
          cd backend
          coverage combine coverage-artifacts
          coverage report
          coverage html -d htmlcov
          coverage xml -o coverage.xml

      - name: Upload full coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-full
          path: |
            backend/coverage.xml
            backend/htmlcov/

  web-lint:
    name: Web Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            npm-

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: TypeScript compile check
        run: |
          cd web
          npx tsc --noEmit

      - name: Vite build
        run: |
          cd web
          npm run build

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [web-lint, integration-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecole -d ecole_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            npm-

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run migrations + seed
        run: |
          cd backend
          alembic upgrade head
          python -m app.seed

      - name: Start API server
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done

      - name: Install web dependencies
        run: |
          cd web
          npm ci

      - name: Build web app
        run: |
          cd web
          npm run build

      - name: Install Playwright browsers
        run: |
          cd web
          npx playwright install --with-deps chromium

      - name: Start web preview server
        run: |
          cd web
          npx vite preview --port 5173 --host &
          sleep 3

      - name: Run Playwright E2E tests
        run: |
          cd web
          BASE_URL=http://localhost:5173 npx playwright test --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/

  security-audit:
