  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, contract-tests, security-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
          pip install diff-cover

      - name: Download backend coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          path: backend/coverage-artifacts
          merge-multiple: true

      - name: Build combined backend coverage report
        run: |
          cd backend
          coverage combine coverage-artifacts
          coverage html -d htmlcov --fail-under=0
          coverage xml -o coverage.xml --fail-under=0
          coverage report --fail-under=0

      - name: Run diff-cover on PRs
        if: github.event_name == 'pull_request'
        run: |
          cd backend
          diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=95

      - name: Upload full coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-full
          path: |
            backend/coverage.xml
            backend/htmlcov/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  web-lint:
    name: Web Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            npm-

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: TypeScript compile check
        run: |
          cd web
          npx tsc --noEmit

      - name: Vite build
        run: |
          cd web
          npm run build

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [web-lint, integration-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
