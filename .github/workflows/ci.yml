# CI Pipeline — École Platform
#
# Reference: S-125 — CI pipeline, EP-08 Testing & Quality
# Stages: lint → security → unit → integration → contract → security-runtime → coverage

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Check migration branch conflicts
        run: |
          cd backend
          heads=$(alembic heads | wc -l)
          if [ "$heads" -gt 1 ]; then
            echo "ERROR: Multiple migration heads detected — merge required"
            alembic heads
            exit 1
          fi

      - name: Ruff check (lint)
        run: |
          cd backend
          ruff check app/ tests/

      - name: Ruff format check
        run: |
          cd backend
          ruff format --check app/ tests/

      - name: OpenAPI spec drift check (Phase 3A)
        run: |
          cd backend
          python scripts/export_openapi.py --check

      - name: Helm lint
        run: |
          helm lint ./infra/k8s

      - name: Helm template validation (staging)
        run: |
          helm template ecole-platform ./infra/k8s \
            -f ./infra/k8s/values-staging.yaml \
            --namespace ecole-staging \
            --debug

      - name: Helm template validation (production)
        run: |
          helm template ecole-platform ./infra/k8s \
            -f ./infra/k8s/values-prod.yaml \
            --namespace ecole-prod \
            --debug

  security-trivy:
    name: Security - Trivy
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ecole-backend:ci ./backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecole-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  security-pip-audit:
    name: Security - pip-audit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --strict

  security-bandit:
    name: Security - Bandit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install Bandit
        run: pip install "bandit[toml]"

      - name: Run Bandit
        run: bandit -r backend/app/ -c backend/pyproject.toml -ll -f json -o bandit-report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  migration-safety:
    name: Migration Safety
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ecole_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d ecole_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/ecole_migration_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Alembic changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            alembic:
              - 'backend/alembic/**'

      - name: Skip when no Alembic files changed
        if: steps.changes.outputs.alembic != 'true'
        run: echo "No Alembic changes detected; skipping migration safety checks."

      - name: Set up Python
        if: steps.changes.outputs.alembic == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        if: steps.changes.outputs.alembic == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Forward migration
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          alembic upgrade head

      - name: Verify downgrade reversibility
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          alembic downgrade base

      - name: Re-apply to confirm idempotency
        if: steps.changes.outputs.alembic == 'true'
        run: |
          cd backend
          alembic upgrade head

  unit-tests:
    name: Unit Tests (Py ${{ matrix.python-version }}, PG ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        postgres-version: ["15", "16", "17"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecole -d ecole_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      TEST_DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          cd backend
          pytest tests/unit/ -v --tb=short --cov=app --cov-branch --cov-report=xml --cov-report=term --cov-fail-under=0

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit-${{ matrix.python-version }}-pg${{ matrix.postgres-version }}
          path: backend/coverage.xml

      - name: Upload unit coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-unit-${{ matrix.python-version }}-pg${{ matrix.postgres-version }}
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

  integration-tests:
    name: Integration Tests (Py ${{ matrix.python-version }}, PG ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        postgres-version: ["15", "16", "17"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecole -d ecole_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test
      SEED_ON_STARTUP: "true"
      ACCOUNT_LOCKOUT_ENABLED: "true"
      ACCOUNT_LOCKOUT_MAX_ATTEMPTS: "5"
      ACCOUNT_LOCKOUT_DURATION_MINUTES: "15"
      GOOGLE_OAUTH_ENABLED: "false"
      MICROSOFT_OAUTH_ENABLED: "false"
      MOCK_OAUTH_ENABLED: "true"
      MOCK_OAUTH_BASE_URL: "http://localhost:9999"
      MOCK_SMS_ENABLED: "true"
      RATE_LIMIT_DEFAULT_LIMIT: "100"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      TESTMAIL_ENABLED: "true"
      TESTMAIL_API_KEY: ${{ secrets.TESTMAIL_API_KEY }}
      TESTMAIL_NAMESPACE: "ibatt"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-test.txt

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Seed test data
        run: |
          cd backend
          python -m app.seed

      - name: Start mock OAuth server
        run: |
          cd system-tests/mock-oauth-server
          python main.py &
          MOCK_OAUTH_PID=$!
          echo "MOCK_OAUTH_PID=$MOCK_OAUTH_PID" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            curl -sf http://localhost:9999/ && break
            sleep 1
          done

      - name: Run integration tests
        run: |
          cd backend
          coverage erase
          coverage run --parallel-mode --source=app -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          cleanup() {
            kill -INT "$SERVER_PID" || true
            wait "$SERVER_PID" || true
            kill $MOCK_OAUTH_PID || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done
          pytest tests/integration/api/auth/test_complete_auth.py tests/integration/api/auth/test_role_flow.py -v --tb=short --cov=app --cov-branch --cov-report=xml --cov-report=term --cov-fail-under=0
          kill -INT "$SERVER_PID" || true
          wait "$SERVER_PID" || true
          trap - EXIT

      - name: Upload integration coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-integration-${{ matrix.python-version }}-pg${{ matrix.postgres-version }}
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

  contract-tests:
