          PGPASSWORD=ecole psql -h localhost -U ecole -d ecole_platform -c "DELETE FROM failed_login_attempts WHERE email='admin@ecole-benani.ma';" 2>/dev/null || true

      - name: Get admin token
        id: token
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8000/api/v1/auth/login \
