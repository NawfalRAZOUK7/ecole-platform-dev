          coverage run --parallel-mode --source=app -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          cleanup() {
            kill -INT "$SERVER_PID" || true
            wait "$SERVER_PID" || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done
          pytest tests/test_security_audit.py -v --tb=short
          kill -INT "$SERVER_PID" || true
          wait "$SERVER_PID" || true
          trap - EXIT

      - name: Upload security audit coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-security-audit
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

  load-tests:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecole
          POSTGRES_PASSWORD: ecole
          POSTGRES_DB: ecole_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecole -d ecole_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://ecole:ecole@localhost:5432/ecole_platform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run migrations + seed
        run: |
          cd backend
          alembic upgrade head
          python -m app.seed

      - name: Start API server
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 login scenario
        run: |
          k6 run tests/load/scenario1_logins.js \
            --env BASE_URL=http://localhost:8000/api/v1

      - name: Run k6 GET requests scenario
        run: |
          k6 run tests/load/scenario2_get_requests.js \
            --env BASE_URL=http://localhost:8000/api/v1

      - name: Run k6 file upload scenario
        run: |
          k6 run tests/load/scenario3_file_uploads.js \
            --env BASE_URL=http://localhost:8000/api/v1

      - name: Run k6 WebSocket scenario
        run: |
          k6 run tests/load/scenario4_websocket.js \
            --env BASE_URL=http://localhost:8000/api/v1 \
            --env WS_URL=ws://localhost:8000/api/v1/ws

  publish-images:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-trivy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          echo "sha_tag=$(echo '${{ github.sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/backend:${{ steps.meta.outputs.sha_tag }}
          format: spdx-json
          output-file: sbom-backend.spdx.json

      - name: Generate web SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/web:${{ steps.meta.outputs.sha_tag }}
          format: spdx-json
          output-file: sbom-web.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-sboms
          path: |
            sbom-backend.spdx.json
            sbom-web.spdx.json
