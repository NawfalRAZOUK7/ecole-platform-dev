      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: test
      SEED_ON_STARTUP: "true"
      ACCOUNT_LOCKOUT_ENABLED: "true"
      ACCOUNT_LOCKOUT_MAX_ATTEMPTS: "5"
      ACCOUNT_LOCKOUT_DURATION_MINUTES: "15"
      GOOGLE_OAUTH_ENABLED: "false"
      MICROSOFT_OAUTH_ENABLED: "false"
      MOCK_OAUTH_ENABLED: "true"
      MOCK_OAUTH_BASE_URL: "http://localhost:9999"
      MOCK_SMS_ENABLED: "true"
      RATE_LIMIT_DEFAULT_LIMIT: "100"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      TESTMAIL_ENABLED: "true"
      TESTMAIL_API_KEY: ${{ secrets.TESTMAIL_API_KEY }}
      TESTMAIL_NAMESPACE: "ibatt"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-test.txt

      - name: Run migrations + seed
        run: |
          cd backend
          alembic upgrade head
          python -m app.seed

      - name: Start mock OAuth server
        run: |
          cd system-tests/mock-oauth-server
          python main.py &
          MOCK_OAUTH_PID=$!
          echo "MOCK_OAUTH_PID=$MOCK_OAUTH_PID" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            curl -sf http://localhost:9999/ && break
            sleep 1
          done

      - name: Run contract tests with API coverage
        run: |
          cd backend
          coverage erase
          coverage run --parallel-mode --source=app -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          cleanup() {
            kill -INT "$SERVER_PID" || true
            wait "$SERVER_PID" || true
            kill $MOCK_OAUTH_PID || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done
          pytest tests/contract/ -v --tb=short --cov=app --cov-branch --cov-report=xml --cov-report=term --cov-fail-under=0
          kill -INT "$SERVER_PID" || true
          wait "$SERVER_PID" || true
          trap - EXIT

      - name: Upload contract coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data-contract
          path: backend/.coverage*
          include-hidden-files: true
          if-no-files-found: warn

