      GOOGLE_OAUTH_ENABLED: "false"
      MICROSOFT_OAUTH_ENABLED: "false"
      MOCK_OAUTH_ENABLED: "true"
      MOCK_OAUTH_BASE_URL: "http://localhost:9999"
      MOCK_SMS_ENABLED: "true"
      RATE_LIMIT_DEFAULT_LIMIT: "100"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      TESTMAIL_ENABLED: "true"
      TESTMAIL_API_KEY: ${{ secrets.TESTMAIL_API_KEY }}
      TESTMAIL_NAMESPACE: "ibatt"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements-test.txt

      - name: Run migrations + seed
        run: |
          cd backend
          alembic upgrade head
          python -m app.seed

      - name: Start API server
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 1
          done

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 login scenario
        run: |
          k6 run system-tests/load/baseline/01_logins.js \
            --env BASE_URL=http://localhost:8000/api/v1 \
            --out json=k6-results-scenario1.json \
            --summary-trend-stats="avg,p(90),p(95),p(99)"

      - name: Run k6 GET requests scenario
        run: |
          k6 run system-tests/load/baseline/02_get_requests.js \
            --env BASE_URL=http://localhost:8000/api/v1 \
            --out json=k6-results-scenario2.json \
            --summary-trend-stats="avg,p(90),p(95),p(99)"

      - name: Run k6 file upload scenario
        run: |
          k6 run system-tests/load/baseline/03_file_uploads.js \
            --env BASE_URL=http://localhost:8000/api/v1 \
            --out json=k6-results-scenario3.json \
            --summary-trend-stats="avg,p(90),p(95),p(99)"

      - name: Run k6 WebSocket scenario
        run: |
          k6 run system-tests/load/baseline/04_websocket.js \
            --env BASE_URL=http://localhost:8000/api/v1 \
            --env WS_URL=ws://localhost:8000/api/v1/ws \
            --out json=k6-results-scenario4.json \
            --summary-trend-stats="avg,p(90),p(95),p(99)"

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-results
          path: k6-results-*.json
          retention-days: 30

  publish-images:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, postman-tests, security-trivy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          echo "sha_tag=$(echo '${{ github.sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"
          echo "image_repo=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/backend:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image_repo }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}/web:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image_repo }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image_repo }}/backend:${{ steps.meta.outputs.sha_tag }}
          format: spdx-json
          output-file: sbom-backend.spdx.json

      - name: Generate web SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image_repo }}/web:${{ steps.meta.outputs.sha_tag }}
          format: spdx-json
          output-file: sbom-web.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-sboms
          path: |
            sbom-backend.spdx.json
            sbom-web.spdx.json
