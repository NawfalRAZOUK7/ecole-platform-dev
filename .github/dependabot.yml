version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Africa/Casablanca
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    groups:
      security:
        patterns:
          - cryptography
          - python-jose
          - passlib
          - pyotp
      database:
        patterns:
          - sqlalchemy
          - alembic
          - asyncpg

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Africa/Casablanca
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Africa/Casablanca
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Africa/Casablanca
    labels:
      - dependencies
      - ci
