    <script>
        const spec = {"openapi": "3.1.0", "info": {"title": "École Platform API", "description": "EdTech SaaS platform API for K-12 schools in Morocco.\n\n## Domains\n- **IAM** — Authentication, authorization, invitations, recovery, 2FA\n- **ERP** — Classes, enrollments, teacher assignments, attendance\n- **LMS** — Courses, assignments, submissions, results, content, activities, assessments\n- **Billing** — Invoices and payments\n- **COM** — Notifications, consents, parent feed\n- **AI** — Writing assistance, recommendations, KPIs\n\n## Authentication\nAll protected endpoints require a `Bearer` access token in the `Authorization` header.\nTokens are obtained via `POST /auth/login`.", "version": "0.1.0"}, "paths": {"/api/v1/health": {"get": {"tags": ["system"], "summary": "Health check", "description": "Health check endpoint.\n\nReturns service status and version. Used by Docker health checks\nand monitoring systems (Pack F2).", "operationId": "health_check_api_v1_health_get", "responses": {"200": {"description": "Service status, version, and timestamp", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HealthResponse"}}}}}}}, "/api/v1/readiness": {"get": {"tags": ["system"], "summary": "Readiness probe", "description": "Readiness probe for container orchestration.\n\nVerifies that both PostgreSQL and Redis are reachable.\nReturns 200 if all dependencies are healthy, 503 if any are down.\nUsed by Kubernetes readiness probes and load balancers.", "operationId": "readiness_check_api_v1_readiness_get", "responses": {"200": {"description": "Database and Redis connectivity status", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ReadinessResponse"}}}}}}}, "/api/v1/auth/login": {"post": {"tags": ["auth"], "summary": "Authenticate user", "description": "Authenticate user and create a session.\n\nReturns access token in response body.\nSets refresh token as HttpOnly/Secure/SameSite=Lax cookie.\nSets CSRF token as non-HttpOnly cookie (for double-submit pattern).", "operationId": "login_api_v1_auth_login_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/LoginRequest"}}}, "required": true}, "responses": {"200": {"description": "Access token or 2FA temp token", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/LoginResponseEnvelope"}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/auth/register": {"post": {"tags": ["auth"], "summary": "Register with invitation code", "description": "Register a new account using an invitation code.\n\nCreates user + membership + role-specific profile in one transaction.\nReturns JWT tokens so the user is logged in immediately.\nRate limited: 5 registrations per 15 minutes per IP (auth category).", "operationId": "register_api_v1_auth_register_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/RegisterRequest"}}}, "required": true}, "responses": {"201": {"description": "JWT tokens + user info", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/auth/refresh": {"post": {"tags": ["auth"], "summary": "Refresh access token", "description": "Refresh the access token using a valid refresh token from the HttpOnly cookie.\n\nRequires X-CSRF-Token header matching the double-submit cookie value.\nImplements token rotation: old refresh token invalidated, new one issued.", "operationId": "refresh_api_v1_auth_refresh_post", "parameters": [{"name": "X-CSRF-Token", "in": "header", "required": false, "schema": {"anyOf": [{"type": "string"}, {"type": "null"}], "title": "X-Csrf-Token"}}, {"name": "refresh_token", "in": "cookie", "required": false, "schema": {"anyOf": [{"type": "string"}, {"type": "null"}], "title": "Refresh Token"}}], "responses": {"200": {"description": "New access token", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/auth/logout": {"post": {"tags": ["auth"], "summary": "Revoke current session", "description": "Revoke the user's session and clear authentication cookies.\n\nIdempotent: calling logout on an already-revoked session returns 200.", "operationId": "logout_api_v1_auth_logout_post", "responses": {"200": {"description": "Empty success response", "content": {"application/json": {"schema": {}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/auth/me": {"get": {"tags": ["auth"], "summary": "Get current user profile", "description": "Return the authenticated user's profile with permissions and memberships.\n\nThis endpoint is the frontend's source of truth for RBAC UI gating.", "operationId": "me_api_v1_auth_me_get", "responses": {"200": {"description": "User profile with permissions and memberships", "content": {"application/json": {"schema": {}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/auth/sessions": {"get": {"tags": ["auth"], "summary": "List active sessions", "description": "List the authenticated user's active sessions with device info.\n\nReturns sessions with: session_id, source, user_agent, ip_address,\ndevice_name, created_at, last_active.", "operationId": "list_sessions_api_v1_auth_sessions_get", "responses": {"200": {"description": "List of active sessions with device info", "content": {"application/json": {"schema": {}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/auth/login-history": {"get": {"tags": ["auth"], "summary": "List my login history", "description": "List the authenticated user's login history for the last 90 days.", "operationId": "login_history_api_v1_auth_login_history_get", "security": [{"HTTPBearer": []}], "parameters": [{"name": "cursor", "in": "query", "required": false, "schema": {"anyOf": [{"type": "string"}, {"type": "null"}], "title": "Cursor"}}, {"name": "limit", "in": "query", "required": false, "schema": {"type": "integer", "maximum": 100, "minimum": 1, "default": 20, "title": "Limit"}}], "responses": {"200": {"description": "Paginated login history for the authenticated user", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/auth/sessions/{session_id}": {"delete": {"tags": ["auth"], "summary": "Revoke a session", "description": "Revoke a specific session by ID.\n\nUsers can revoke their own sessions. ADM can revoke any session in the school.\nInvalidates the refresh token and clears the session from Redis.", "operationId": "revoke_session_api_v1_auth_sessions__session_id__delete", "security": [{"HTTPBearer": []}], "parameters": [{"name": "session_id", "in": "path", "required": true, "schema": {"type": "string", "format": "uuid", "title": "Session Id"}}], "responses": {"200": {"description": "Session revocation confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/auth/change-password": {"post": {"tags": ["auth"], "summary": "Change password", "description": "Change the authenticated user's password.\n\nRequires current password verification. Enforces password policy on new password.\nRevokes all other active sessions (keeps current session).", "operationId": "change_password_api_v1_auth_change_password_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/ChangePasswordRequest"}}}, "required": true}, "responses": {"200": {"description": "Password change confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/auth/2fa/setup": {"post": {"tags": ["auth"], "summary": "Start 2FA setup", "description": "Generate a new TOTP secret and QR code provisioning URI.\n\nReturns the secret and URI for the authenticator app.\n2FA is not yet active — call /auth/2fa/verify-setup with a valid code to activate.", "operationId": "two_factor_setup_api_v1_auth_2fa_setup_post", "responses": {"200": {"description": "TOTP secret and provisioning URI", "content": {"application/json": {"schema": {}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/auth/2fa/verify-setup": {"post": {"tags": ["auth"], "summary": "Activate 2FA", "description": "Verify first TOTP code to activate 2FA.\n\nReturns 10 single-use backup codes (shown once, store securely).", "operationId": "two_factor_verify_setup_api_v1_auth_2fa_verify_setup_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/TwoFactorVerifySetupRequest"}}}, "required": true}, "responses": {"200": {"description": "Backup codes and confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/auth/2fa/disable": {"post": {"tags": ["auth"], "summary": "Disable 2FA", "description": "Disable 2FA. Requires a valid TOTP code or backup code.", "operationId": "two_factor_disable_api_v1_auth_2fa_disable_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/TwoFactorDisableRequest"}}}, "required": true}, "responses": {"200": {"description": "2FA deactivation confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/auth/2fa/verify": {"post": {"tags": ["auth"], "summary": "Verify 2FA code during login", "description": "Verify TOTP code during login flow.\n\nCalled after login returns requires_2fa=true.\nAccepts temp_token + TOTP code (or backup code) and returns full tokens.", "operationId": "two_factor_verify_login_api_v1_auth_2fa_verify_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/TwoFactorVerifyLoginRequest"}}}, "required": true}, "responses": {"200": {"description": "Access token after successful 2FA", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/auth/verify-email": {"post": {"tags": ["auth"], "summary": "Verify email address", "description": "Verify email address via OTP sent during invite consumption.", "operationId": "verify_email_api_v1_auth_verify_email_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/EmailVerifyRequest"}}}, "required": true}, "responses": {"200": {"description": "Email verification confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/schools": {"post": {"tags": ["schools"], "summary": "Create a school", "operationId": "create_school_api_v1_schools_post", "security": [{"HTTPBearer": []}], "requestBody": {"required": true, "content": {"application/json": {"schema": {"$ref": "#/components/schemas/SchoolCreateRequest"}}}}, "responses": {"201": {"description": "Created school", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}, "get": {"tags": ["schools"], "summary": "List schools", "operationId": "list_schools_api_v1_schools_get", "security": [{"HTTPBearer": []}], "parameters": [{"name": "cursor", "in": "query", "required": false, "schema": {"anyOf": [{"type": "string"}, {"type": "null"}], "title": "Cursor"}}, {"name": "limit", "in": "query", "required": false, "schema": {"type": "integer", "maximum": 100, "minimum": 1, "default": 20, "title": "Limit"}}, {"name": "status", "in": "query", "required": false, "schema": {"anyOf": [{"type": "string", "pattern": "^(active|suspended|trial)$"}, {"type": "null"}], "title": "Status"}}], "responses": {"200": {"description": "List of schools", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/schools/{school_id}": {"get": {"tags": ["schools"], "summary": "Get a school", "operationId": "get_school_api_v1_schools__school_id__get", "security": [{"HTTPBearer": []}], "parameters": [{"name": "school_id", "in": "path", "required": true, "schema": {"type": "string", "format": "uuid", "title": "School Id"}}], "responses": {"200": {"description": "School details", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ApiResponse_SchoolResponse_"}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}, "patch": {"tags": ["schools"], "summary": "Update a school", "operationId": "update_school_api_v1_schools__school_id__patch", "security": [{"HTTPBearer": []}], "parameters": [{"name": "school_id", "in": "path", "required": true, "schema": {"type": "string", "format": "uuid", "title": "School Id"}}], "requestBody": {"required": true, "content": {"application/json": {"schema": {"$ref": "#/components/schemas/SchoolUpdateRequest"}}}}, "responses": {"200": {"description": "Updated school", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}, "delete": {"tags": ["schools"], "summary": "Deactivate a school", "operationId": "delete_school_api_v1_schools__school_id__delete", "security": [{"HTTPBearer": []}], "parameters": [{"name": "school_id", "in": "path", "required": true, "schema": {"type": "string", "format": "uuid", "title": "School Id"}}], "responses": {"200": {"description": "Soft-deleted school", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/invites/create": {"post": {"tags": ["invitations"], "summary": "Create invitation code", "description": "Create an invitation code for onboarding new users.\n\nReturns the plaintext code (shown once, never stored).", "operationId": "create_invite_api_v1_invites_create_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/InviteCreateRequest"}}}, "required": true}, "responses": {"201": {"description": "Plaintext invitation code (shown once)", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/invites/consume": {"post": {"tags": ["invitations"], "summary": "Consume invitation code", "description": "Consume an invitation code to join a school with the specified role.\n\nIdempotent: same code + same user = returns existing membership.", "operationId": "consume_invite_api_v1_invites_consume_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/InviteConsumeRequest"}}}, "required": true}, "responses": {"200": {"description": "New membership details", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/invites/revoke": {"post": {"tags": ["invitations"], "summary": "Revoke invitation code", "description": "Soft-revoke an invitation code.\n\nIdempotent: revoking an already-revoked code is a no-op.", "operationId": "revoke_invite_api_v1_invites_revoke_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/InviteRevokeRequest"}}}, "required": true}, "responses": {"200": {"description": "Revocation confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/recovery/request": {"post": {"tags": ["recovery"], "summary": "Request password recovery", "description": "Request account recovery. Always returns 200 to prevent email enumeration.\n\nIf user exists: creates recovery request and generates OTP (logged in dev).\nIf user doesn't exist: returns success anyway.", "operationId": "request_recovery_api_v1_recovery_request_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/RecoveryRequestCreate"}}}, "required": true}, "responses": {"200": {"description": "Recovery request ID (always 200, no email enumeration)", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/recovery/verify": {"post": {"tags": ["recovery"], "summary": "Verify recovery OTP", "description": "Verify recovery OTP. Transitions status: pending -> verified.\n\nLockout after 5 failed attempts (30-minute lock).", "operationId": "verify_recovery_api_v1_recovery_verify_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/RecoveryVerifyRequest"}}}, "required": true}, "responses": {"200": {"description": "OTP verification confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/recovery/reset": {"post": {"tags": ["recovery"], "summary": "Reset password", "description": "Reset user's password. Requires status=verified.\n\nRevokes all active sessions for the user (force re-login).\nState machine: pending -> verified -> reset (no backward transitions).", "operationId": "reset_password_api_v1_recovery_reset_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/RecoveryResetRequest"}}}, "required": true}, "responses": {"200": {"description": "Password reset confirmation", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/classes/{class_id}": {"get": {"tags": ["erp-classes"], "summary": "Get class details", "description": "Get class details by ID.\n\nFull security pipeline:\n1. AuthN — verified by get_current_user (via requires_permission)\n2. RBAC — requires PERM-ERP:class:read\n3. ABAC — school boundary (404 for other school's classes)\n4. ABAC — teacher assignment (TCH only sees assigned classes)", "operationId": "get_class_api_v1_classes__class_id__get", "security": [{"HTTPBearer": []}], "parameters": [{"name": "class_id", "in": "path", "required": true, "schema": {"type": "string", "format": "uuid", "title": "Class Id"}}], "responses": {"200": {"description": "Class with capacity, level, academic year", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/ApiResponse_ClassResponse_"}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}}}, "/api/v1/enrollments": {"get": {"tags": ["erp-enrollments"], "summary": "Compatibility: list active enrollments for current user", "description": "List active class enrollments for the authenticated student.", "operationId": "list_enrollments_api_v1_enrollments_get", "responses": {"200": {"description": "Active enrollment list", "content": {"application/json": {"schema": {}}}}}, "security": [{"HTTPBearer": []}]}, "post": {"tags": ["erp-enrollments"], "summary": "Enroll student in class", "description": "Enroll a student in a class.\n\nValidates:\n- Student exists and is in the same school\n- Class exists and is in the same school\n- Period is active\n- INV-ERP-CLASS-ACTIVE: one active enrollment per student per period (409)\n\nIdempotent: re-enrolling same student in same class returns existing enrollment.", "operationId": "create_enrollment_api_v1_enrollments_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/EnrollmentCreateRequest"}}}, "required": true}, "responses": {"201": {"description": "Enrollment record", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/class-assignments": {"post": {"tags": ["erp-class-assignments"], "summary": "Assign teacher to class", "description": "Assign a teacher to a class for a period.\n\nValidates:\n1. Teacher exists and is in the same school\n2. Class exists and is in the same school\n3. Period exists and is in the same school\n4. No duplicate assignment (idempotent if same tuple exists)", "operationId": "create_teacher_assignment_api_v1_class_assignments_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/TeacherAssignmentCreateRequest"}}}, "required": true}, "responses": {"201": {"description": "Teacher assignment record", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/attendance/sessions": {"post": {"tags": ["erp-attendance"], "summary": "Create attendance session", "description": "Create an attendance session with records for a class.\n\nValidates:\n1. Class exists and is in the same school\n2. Teacher is assigned to the class (ABAC)\n3. Period is active\n4. No duplicate session for same class/date/slot (409)\n5. Creates attendance records for each student", "operationId": "create_attendance_session_api_v1_attendance_sessions_post", "requestBody": {"content": {"application/json": {"schema": {"$ref": "#/components/schemas/AttendanceSessionCreateRequest"}}}, "required": true}, "responses": {"201": {"description": "Attendance session with records", "content": {"application/json": {"schema": {}}}}, "422": {"description": "Validation Error", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/HTTPValidationError"}}}}}, "security": [{"HTTPBearer": []}]}}, "/api/v1/attendance/class/{class_id}": {"get": {"tags": ["erp-attendance"], "summary": "Compatibility: get class attendance records", "description": "Compatibility wrapper for legacy frontend attendance pages.", "operationId": "get_class_attendance_records_api_v1_attendance_class__class_id__get", "security": [{"HTTPBearer": []}], "parameters": [{"name": "class_id", "in": "path", "required": true, "schema": {"type": "string", "format": "uuid", "title": "Class Id"}}, {"name": "date", "in": "query", "required": true, "schema": {"type": "string", "format": "date", "title": "Date"}}], "responses": {"200": {"description": "Legacy class attendance record list", "content": {"application/json": {"schema": {}}}}, "422": {"description"
