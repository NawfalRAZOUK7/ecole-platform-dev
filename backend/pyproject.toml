[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
markers = [
  "slow: marks tests as slow",
  "security: RBAC/ABAC security matrix tests",
  "performance: benchmark and load tests",
  "unit: fast unit tests with mocked dependencies",
  "integration: tests requiring real database",
]
addopts = ["--strict-markers", "--tb=short", "-q"]

[tool.coverage.run]
source = ["app"]
branch = true
omit = ["app/alembic/*", "app/core/config.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
include = [
  "app/api/v1/micro_school.py",
  "app/api/v1/router.py",
  "app/core/config.py",
  "app/core/exceptions.py",
  "app/core/permissions.py",
  "app/domain/events/micro_school.py",
  "app/models/micro_school.py",
  "app/repositories/micro_school.py",
  "app/schemas/micro_school.py",
  "app/services/micro_school_service.py",
]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:", "if __name__"]

[tool.bandit]
exclude_dirs = ["tests", "alembic"]
skips = ["B101"]
