# Promtail configuration — log shipper for Docker containers
#
# Reference: S-131 — Loki log aggregation, F2 Ch04 — Logging Standard
# Ships Docker container logs to Loki with structured labels.
# Supports correlation_id search via label extraction.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers in ecole-network
      - source_labels: ["__meta_docker_container_name"]
        regex: "ecole-.*"
        action: keep
      # Use container name as label
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container"
        regex: "/(.*)"
        replacement: "$1"
      # Add service label from container name
      - source_labels: ["__meta_docker_container_name"]
        target_label: "service"
        regex: "/ecole-(.*)"
        replacement: "$1"

    pipeline_stages:
      # Parse JSON logs from backend
      - json:
          expressions:
            level: level
            correlation_id: correlation_id
            method: method
            path: path
            status_code: status_code
            latency_ms: latency_ms
            error_code: error_code

      # Extract correlation_id as a label for searchability
      - labels:
          level:
          correlation_id:

      # Redact sensitive data patterns (emails, tokens, passwords)
      - replace:
          expression: '("password"\s*:\s*)"[^"]*"'
          replace: '"password":"[REDACTED]"'
      - replace:
          expression: '("token"\s*:\s*)"[^"]*"'
          replace: '"token":"[REDACTED]"'
      - replace:
          expression: '("refresh_token"\s*:\s*)"[^"]*"'
          replace: '"refresh_token":"[REDACTED]"'

      # Add timestamp
      - timestamp:
          source: timestamp
          format: RFC3339
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"
