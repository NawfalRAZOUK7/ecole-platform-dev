services:
  # ==================== PostgreSQL 16 ====================
  postgres:
    image: postgres:16-alpine
    container_name: ecole-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-ecole_platform}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-change-me-app-user}
      APP_READONLY_PASSWORD: ${APP_READONLY_PASSWORD:-change-me-readonly}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ecole} -d ${POSTGRES_DB:-ecole_platform}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: ecole-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-dev-redis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== FastAPI Backend ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: ecole-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecole}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ecole_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-dev-redis}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-a-strong-random-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-2}
      APP_ENV: development
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@ecole-platform.ma}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-École Platform}
      # ---- MinIO / Object Storage (Phase 1) -------------------------
      # Backend still uses local storage until Phase 2 flips these.
      # To activate S3: set STORAGE_BACKEND=s3 and
      # DOCUMENT_STORAGE_BACKEND=s3 in your .env file.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-ecole-dev-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_FORCE_PATH_STYLE: "true"
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-local}
      DOCUMENT_STORAGE_ENDPOINT: http://minio:9000
      DOCUMENT_STORAGE_BUCKET: ${S3_BUCKET:-ecole-dev-private}
      DOCUMENT_STORAGE_REGION: ${S3_REGION:-us-east-1}
      DOCUMENT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      DOCUMENT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      DOCUMENT_STORAGE_FORCE_PATH_STYLE: "true"
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
      - ../backend/tests:/app/tests
      - ../backend/scripts:/app/scripts
      - ../backend/docs:/app/docs
      # uploads/ is stored in MinIO (STORAGE_BACKEND=s3). No local volume mount needed.
      # If you temporarily switch back to STORAGE_BACKEND=local, re-add:
      #   - upload_data:/app/uploads  (and restore the upload_data volume declaration below)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== ARQ Background Worker ====================
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: ecole-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecole}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ecole_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-dev-redis}@redis:6379/0
      APP_ENV: development
      LOG_LEVEL: DEBUG
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@ecole-platform.ma}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-École Platform}
      UPLOAD_DIR: /app/uploads
      # ---- MinIO / Object Storage (Phase 1) -------------------------
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-ecole-dev-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_FORCE_PATH_STYLE: "true"
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-local}
      DOCUMENT_STORAGE_ENDPOINT: http://minio:9000
      DOCUMENT_STORAGE_BUCKET: ${S3_BUCKET:-ecole-dev-private}
      DOCUMENT_STORAGE_REGION: ${S3_REGION:-us-east-1}
      DOCUMENT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      DOCUMENT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      DOCUMENT_STORAGE_FORCE_PATH_STYLE: "true"
    command: ["arq", "app.core.tasks.WorkerSettings"]
    volumes:
      - ../backend/app:/app/app
      # uploads/ is in MinIO — no local volume mount. See backend service comment above.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Vite Web Frontend ====================
  web:
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    container_name: ecole-web
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== MinIO Object Storage (Dev) ====================
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: ecole-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      # Dev-only KMS key for SSE-S3 encryption.
      # NEVER use this hardcoded value outside local development.
      # Generate a real key: openssl rand -base64 32
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:-ecole-dev-key:dGhpc2lzYWRldmtleWZvcmVjb2xlcGxhdGZvcm0xMjM=}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9000/minio/health/live || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== MinIO Init (one-shot bucket setup) ====================
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: ecole-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${S3_BUCKET:-ecole-dev-private}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
        mc mb --ignore-existing local/$$MINIO_BUCKET
        mc anonymous set none local/$$MINIO_BUCKET
        mc encrypt set sse-s3 local/$$MINIO_BUCKET
        mc ilm rule add --expire-days 730 --prefix 'submissions/' local/$$MINIO_BUCKET
        mc ilm rule add --expire-days 30  --prefix 'documents/previews/' local/$$MINIO_BUCKET
        mc ilm rule add --expire-days 7   --prefix 'reports/' local/$$MINIO_BUCKET
        echo 'MinIO initialization complete.'
    networks:
      - ecole-network
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  # upload_data volume removed — Phase 5 cleanup complete (grace period elapsed).
  # The Docker volume may still exist on disk; remove it manually only after
  # confirming the archive in backups/ is intact:
  #   docker volume rm ecole-platform-dev_upload_data
  minio_data:

networks:
  ecole-network:
    driver: bridge
