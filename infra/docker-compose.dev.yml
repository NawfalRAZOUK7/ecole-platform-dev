services:
  # ==================== PostgreSQL 16 ====================
  postgres:
    image: postgres:16-alpine
    container_name: ecole-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-ecole_platform}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-change-me-app-user}
      APP_READONLY_PASSWORD: ${APP_READONLY_PASSWORD:-change-me-readonly}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecole} -d ${POSTGRES_DB:-ecole_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: ecole-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-dev-redis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== FastAPI Backend ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: ecole-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecole}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ecole_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-dev-redis}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-a-strong-random-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-2}
      APP_ENV: development
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@ecole-platform.ma}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-École Platform}
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
      - ../backend/tests:/app/tests
      - ../backend/scripts:/app/scripts
      - ../backend/docs:/app/docs
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== ARQ Background Worker ====================
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: ecole-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecole}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ecole_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-dev-redis}@redis:6379/0
      APP_ENV: development
      LOG_LEVEL: DEBUG
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@ecole-platform.ma}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-École Platform}
      UPLOAD_DIR: /app/uploads
    command: ["arq", "app.core.tasks.WorkerSettings"]
    volumes:
      - ../backend/app:/app/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Vite Web Frontend ====================
  web:
    image: node:22-alpine
    container_name: ecole-web
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - ecole-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  upload_data:

networks:
  ecole-network:
    driver: bridge
