# Monitoring Stack — Prometheus, Grafana, Alertmanager, Loki
#
# Reference: S-128/S-129/S-130/S-131 — Observability stack per F2
# Stack: Prometheus (metrics) + Grafana (dashboards) + Alertmanager (alerts) + Loki (logs)
#
# Usage: docker compose -f infra/docker-compose.dev.yml -f infra/docker-compose.monitoring.yml up -d

services:
  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ecole-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    networks:
      - ecole-network
    restart: unless-stopped

  # ==================== Tempo (Tracing) ====================
  tempo:
    image: grafana/tempo:2.4.0
    container_name: ecole-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "4317:4317"
      - "3200:3200"
    networks:
      - ecole-network
    restart: unless-stopped

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ecole-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # CHANGE THIS ON FIRST DEPLOYMENT
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-grafana-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - ecole-network
    restart: unless-stopped

  # ==================== Alertmanager ====================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ecole-alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - ecole-network
    restart: unless-stopped

  # ==================== Loki (Log Aggregation) ====================
  loki:
    image: grafana/loki:2.9.4
    container_name: ecole-loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./loki/rules:/loki/rules:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - ecole-network
    restart: unless-stopped

  # ==================== Promtail (Log Shipper) ====================
  promtail:
    image: grafana/promtail:2.9.4
    container_name: ecole-promtail
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ecole-network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  ecole-network:
    external: true
    name: infra_ecole-network
