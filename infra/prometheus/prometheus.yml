# Prometheus configuration — École Platform
#
# Reference: Prometheus metrics exporter, observability & SLO
# Scrapes the FastAPI /metrics endpoint for golden signal metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alert rules
rule_files:
  - "alert_rules.yml"

# Alertmanager target
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# Scrape targets
scrape_configs:
  # ── FastAPI Backend ──
  - job_name: "ecole-backend"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8000"]
        labels:
          env: "${APP_ENV:-development}"
          service: "api-backend"

  # ── Prometheus self-monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

