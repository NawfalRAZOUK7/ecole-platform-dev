# Grafana dashboard provisioning — auto-load dashboard JSON files
#
# Reference: Grafana dashboards

apiVersion: 1

providers:
  - name: "Ecole Platform Dashboards"
    orgId: 1
    folder: "Ecole Platform"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
