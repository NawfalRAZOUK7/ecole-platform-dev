# Production Environment — École Platform
#
# Reference: Phase 0A + Phase 7A — Infrastructure Production Hardening
#
# Prerequisites:
#   1. Create .env.prod with all required vars (see .env.example)
#   2. Place TLS certs in ./certs/ (fullchain.pem, privkey.pem)
#      OR run ssl-renew.sh to obtain certs from Let's Encrypt
#   3. Create Docker secrets files in ./secrets/:
#        openssl rand -hex 32 > infra/secrets/jwt_secret_key.txt
#        openssl rand -base64 24 > infra/secrets/db_password.txt
#        openssl rand -base64 24 > infra/secrets/app_db_password.txt
#        openssl rand -base64 24 > infra/secrets/app_readonly_password.txt
#        printf '%s' 'postgresql+asyncpg://ecole:<db-password>@postgres:5432/ecole_platform' > infra/secrets/database_url.txt
#        openssl rand -base64 24 > infra/secrets/redis_password.txt
#        printf '%s' 'redis://:<redis-password>@redis:6379/0' > infra/secrets/redis_url.txt
#        printf '%s' 'your-smtp-password' > infra/secrets/smtp_password.txt
#
# Usage:
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d
#
# Zero-downtime deploy:
#   ./infra/scripts/deploy.sh
#
# Health check:
#   ./infra/scripts/healthcheck.sh
#
# URLs (per F1):
#   API: https://api.ecole-platform.example/api/v1
#   Web: https://ecole-platform.example

services:
  # ==================== FastAPI Backend (Production) ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    # Note: no container_name to allow scaling with --scale backend=N
    environment:
      # Database — use Docker secret or managed PostgreSQL URL secret in production
      DATABASE_URL_FILE: /run/secrets/database_url
      # Cache — use Docker secret or managed Redis URL secret in production
      REDIS_URL_FILE: /run/secrets/redis_url
      # Auth
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # App
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ecole-platform.example}
      # Features
      ENABLE_TRACING: "true"
      ENABLE_STRICT_RATE_LIMIT: "true"
      # File uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      # S3 / Object storage
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-ecole-uploads}
      S3_REGION: ${S3_REGION:-auto}
      # TOTP
      TOTP_ISSUER: ${TOTP_ISSUER:-EcolePlatform}
      # Timezone
      TZ: ${TZ:-Africa/Casablanca}
    volumes:
      - backend_uploads:/app/uploads
    secrets:
      - database_url
      - redis_url
      - jwt_secret_key
      - smtp_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/v1/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ==================== PostgreSQL 16 (Production) ====================
  # NOTE: In production, prefer a managed database (AWS RDS, Azure Database,
  #       DigitalOcean Managed DB, etc.) and remove this service.
  #       Set DATABASE_URL to the managed DB connection string instead.
  postgres:
    image: postgres:16-alpine
    container_name: ecole-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecole}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-ecole_platform}
      APP_DB_PASSWORD_FILE: /run/secrets/app_db_password
      APP_READONLY_PASSWORD_FILE: /run/secrets/app_readonly_password
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - prod_wal_archive:/var/lib/postgresql/wal_archive
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=cp %p /var/lib/postgresql/wal_archive/%f"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    secrets:
      - db_password
      - app_db_password
      - app_readonly_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecole} -d ${POSTGRES_DB:-ecole_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ==================== Redis 7 (Production) ====================
  # NOTE: In production, prefer managed Redis (AWS ElastiCache,
  #       Azure Cache, etc.) and remove this service.
  #       Set REDIS_URL to the managed Redis connection string instead.
  redis:
    image: redis:7-alpine
    container_name: ecole-prod-redis
    volumes:
      - prod_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - |
          REDIS_PASSWORD="$$(cat /run/secrets/redis_password)"
          exec redis-server /usr/local/etc/redis/redis.conf \
            --requirepass "$$REDIS_PASSWORD" \
            --maxmemory 512mb \
            --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "REDIS_PASSWORD=\"$$(cat /run/secrets/redis_password)\" && redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - redis_password
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Web Frontend (Production) ====================
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      target: production
    container_name: ecole-prod-web
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Nginx Reverse Proxy (Production) ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: ecole-prod-nginx
    volumes:
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - web
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== ARQ Background Worker (Production) ====================
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: ecole-prod-worker
    command: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_URL_FILE: /run/secrets/redis_url
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-ecole-uploads}
      S3_REGION: ${S3_REGION:-auto}
      TZ: ${TZ:-Africa/Casablanca}
    secrets:
      - database_url
      - redis_url
      - jwt_secret_key
      - smtp_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Certbot (Let's Encrypt) ====================
  # Runs once to obtain/renew certs, then exits.
  # Automated renewal via infra/scripts/ssl-renew.sh (cron).
  certbot:
    image: certbot/certbot:latest
    container_name: ecole-prod-certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    profiles:
      - certbot

# ==================== Docker Secrets ====================
# In Docker Swarm: use `docker secret create`
# In Compose: secrets read from local files (create before first deploy)
secrets:
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  db_password:
    file: ./secrets/db_password.txt
  app_db_password:
    file: ./secrets/app_db_password.txt
  app_readonly_password:
    file: ./secrets/app_readonly_password.txt
  database_url:
    file: ./secrets/database_url.txt
  redis_password:
    file: ./secrets/redis_password.txt
  redis_url:
    file: ./secrets/redis_url.txt
  smtp_password:
    file: ./secrets/smtp_password.txt

# ==================== Volumes ====================
volumes:
  prod_postgres_data:
  prod_redis_data:
  prod_wal_archive:
  backend_uploads:
  certbot_webroot:

# ==================== Network ====================
networks:
  ecole-prod-network:
    driver: bridge
