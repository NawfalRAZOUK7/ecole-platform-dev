# Production Docker Compose — Placeholder
# Reference: Pack F1 — Deployment Architecture
#
# Production deployment will use managed services:
# - Managed PostgreSQL (with PITR backups per F3)
# - Managed Redis
# - Container orchestration (Docker Compose or K8s)
# - Nginx reverse proxy with TLS
# - Centralized secret management
#
# This file will be expanded in Sprint 9 (EP-09: DevOps & Infrastructure)

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - web
    restart: unless-stopped
