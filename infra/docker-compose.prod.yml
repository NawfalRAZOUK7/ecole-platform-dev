# Production Environment — École Platform
#
# Reference: Infrastructure Production Hardening
#
# Prerequisites:
#   1. Create .env.prod with all required vars (see .env.example)
#   2. Place TLS certs in ./certs/ (fullchain.pem, privkey.pem)
#      OR run ssl-renew.sh to obtain certs from Let's Encrypt
#   3. Create Docker secrets files in ./secrets/:
#        openssl rand -hex 32 > infra/secrets/jwt_secret_key.txt
#        openssl rand -base64 24 > infra/secrets/db_password.txt
#        openssl rand -base64 24 > infra/secrets/app_db_password.txt
#        openssl rand -base64 24 > infra/secrets/app_readonly_password.txt
#        printf '%s' 'postgresql+asyncpg://ecole:<db-password>@pgbouncer:6432/ecole_platform' > infra/secrets/database_url.txt
#        openssl rand -base64 24 > infra/secrets/redis_password.txt
#        printf '%s' 'redis://:<redis-password>@redis:6379/0' > infra/secrets/redis_url.txt
#        printf '%s' 'your-smtp-password' > infra/secrets/smtp_password.txt
#
# Usage:
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d
#
# Zero-downtime deploy:
#   ./infra/scripts/deploy.sh
#
# Health check:
#   ./infra/scripts/healthcheck.sh
#
# URLs:
#   API: https://api.ecole-platform.example/api/v1
#   Web: https://ecole-platform.example
#
# SECURITY: All secrets use :? syntax to fail fast if not configured.
# See .env.example for required variables.

services:
  # ==================== FastAPI Backend (Production) ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    # Note: no container_name to allow scaling with --scale backend=N
    environment:
      # Database — secret content should point at PgBouncer on pgbouncer:6432
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL:-}
      # Cache — use Docker secret or managed Redis URL secret in production
      REDIS_URL_FILE: /run/secrets/redis_url
      # Auth
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-2}
      # App
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ecole-platform.example}
      # Features
      ENABLE_TRACING: "true"
      ENABLE_STRICT_RATE_LIMIT: "true"
      # File uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      # S3 / Object storage
      # Activate after storage backend migration: set STORAGE_BACKEND=s3 and
      # DOCUMENT_STORAGE_BACKEND=s3 in your .env.prod file.
      # Credentials must be injected via Docker secrets or IAM roles —
      # never committed as plain-text values.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-ecole-prod-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-local}
      DOCUMENT_STORAGE_ENDPOINT: ${S3_ENDPOINT}
      DOCUMENT_STORAGE_BUCKET: ${S3_BUCKET:-ecole-prod-private}
      DOCUMENT_STORAGE_REGION: ${S3_REGION:-us-east-1}
      DOCUMENT_STORAGE_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      DOCUMENT_STORAGE_SECRET_KEY: ${S3_SECRET_KEY:-}
      DOCUMENT_STORAGE_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      # TOTP
      TOTP_ISSUER: ${TOTP_ISSUER:-EcolePlatform}
      # Timezone
      TZ: ${TZ:-Africa/Casablanca}
    # uploads/ is stored in MinIO (STORAGE_BACKEND=s3). No local volume mount needed.
    # If you temporarily switch back to STORAGE_BACKEND=local, re-add:
    #   volumes:
    #     - backend_uploads:/app/uploads  (and restore backend_uploads in top-level volumes)
    secrets:
      - database_url
      - redis_url
      - jwt_secret_key
      - smtp_password
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; r = httpx.get('http://localhost:8000/api/v1/health'); r.raise_for_status()",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ==================== PostgreSQL 16 (Production) ====================
  # NOTE: In production, prefer a managed database (AWS RDS, Azure Database,
  #       DigitalOcean Managed DB, etc.) and remove this service.
  #       Set DATABASE_URL to the managed DB connection string instead.
  postgres:
    image: postgres:16-alpine
    container_name: ecole-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      APP_DB_PASSWORD_FILE: /run/secrets/app_db_password
      APP_READONLY_PASSWORD_FILE: /run/secrets/app_readonly_password
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - prod_wal_archive:/var/lib/postgresql/wal_archive
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=cp %p /var/lib/postgresql/wal_archive/%f"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    secrets:
      - db_password
      - app_db_password
      - app_readonly_password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER must be set} -d ${POSTGRES_DB:?POSTGRES_DB must be set}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ==================== PgBouncer (Production) ====================
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: ecole-prod-pgbouncer
    entrypoint:
      - /bin/sh
      - -c
      - |
        DB_PASS="$$(cat /run/secrets/db_password)"
        export DATABASE_URL="postgres://${POSTGRES_USER:?POSTGRES_USER must be set}:$${DB_PASS}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}"
        exec /entrypoint.sh
    environment:
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 50
      MAX_CLIENT_CONN: 200
      MAX_DB_CONNECTIONS: 50
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      STATS_PERIOD: 60
    expose:
      - "6432"
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== PostgreSQL Read Replica (Production) ====================
  postgres-replica:
    image: postgres:16-alpine
    container_name: ecole-prod-postgres-replica
    environment:
      PGUSER: replicator
      PGPASSWORD: ${REPLICATOR_PASSWORD:?REPLICATOR_PASSWORD must be set}
    volumes:
      - prod_postgres_replica_data:/var/lib/postgresql/data
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
          until pg_basebackup -h postgres -U replicator -D /var/lib/postgresql/data -Fp -Xs -R; do
            echo "Waiting for primary..."
            sleep 5
          done
        fi
        exec postgres -c hot_standby=on
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U replicator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ==================== Redis 7 (Production) ====================
  # NOTE: In production, prefer managed Redis (AWS ElastiCache,
  #       Azure Cache, etc.) and remove this service.
  #       Set REDIS_URL to the managed Redis connection string instead.
  redis:
    image: redis:7-alpine
    container_name: ecole-prod-redis
    volumes:
      - prod_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - |
        REDIS_PASSWORD="$$(cat /run/secrets/redis_password)"
        exec redis-server /usr/local/etc/redis/redis.conf \
          --requirepass "$$REDIS_PASSWORD" \
          --maxmemory 512mb \
          --maxmemory-policy allkeys-lru
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'REDIS_PASSWORD="$$(cat /run/secrets/redis_password)" && redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - redis_password
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Web Frontend (Production) ====================
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      target: production
    container_name: ecole-prod-web
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Nginx Reverse Proxy (Production) ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: ecole-prod-nginx
    volumes:
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf
      - ./certs:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - web
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== ARQ Background Worker (Production) ====================
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: ecole-prod-worker
    command: ["python", "-m", "arq", "app.core.tasks.WorkerSettings"]
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_URL_FILE: /run/secrets/redis_url
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      # S3 / Object storage (worker mirrors backend config)
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-ecole-prod-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-local}
      DOCUMENT_STORAGE_ENDPOINT: ${S3_ENDPOINT}
      DOCUMENT_STORAGE_BUCKET: ${S3_BUCKET:-ecole-prod-private}
      DOCUMENT_STORAGE_REGION: ${S3_REGION:-us-east-1}
      DOCUMENT_STORAGE_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      DOCUMENT_STORAGE_SECRET_KEY: ${S3_SECRET_KEY:-}
      DOCUMENT_STORAGE_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      TZ: ${TZ:-Africa/Casablanca}
    secrets:
      - database_url
      - redis_url
      - jwt_secret_key
      - smtp_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Certbot (Let's Encrypt) ====================
  # Runs once to obtain/renew certs, then exits.
  # Automated renewal via infra/scripts/ssl-renew.sh (cron).
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: ecole-prod-certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    profiles:
      - certbot

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ecole-prod-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prod_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ecole-prod-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - prod_grafana_data:/var/lib/grafana
    secrets:
      - grafana_admin_password
    depends_on:
      - prometheus
    networks:
      - ecole-prod-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

# ==================== Docker Secrets ====================
# In Docker Swarm: use `docker secret create`
# In Compose: secrets read from local files (create before first deploy)
secrets:
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  db_password:
    file: ./secrets/db_password.txt
  app_db_password:
    file: ./secrets/app_db_password.txt
  app_readonly_password:
    file: ./secrets/app_readonly_password.txt
  database_url:
    file: ./secrets/database_url.txt
  redis_password:
    file: ./secrets/redis_password.txt
  redis_url:
    file: ./secrets/redis_url.txt
  smtp_password:
    file: ./secrets/smtp_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

# ==================== Volumes ====================
volumes:
  prod_prometheus_data:
  prod_grafana_data:
  prod_postgres_data:
  prod_postgres_replica_data:
  prod_redis_data:
  prod_wal_archive:
  # backend_uploads volume removed — cleanup complete (grace period elapsed).
  # The Docker volume may still exist on the host; remove it only after confirming
  # the archive is intact:  docker volume rm ecole-platform-dev_backend_uploads
  certbot_webroot:

# ==================== Network ====================
networks:
  ecole-prod-network:
    driver: bridge
