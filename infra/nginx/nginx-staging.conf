# Nginx staging configuration — TLS + reverse proxy
#
# Reference: F1 Ch06 — Networking, Ingress, TLS
# Rate limits: 120 req/min/user (API), 300 req/min/ip (web)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format with correlation ID
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_correlation_id" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    # Rate limiting zones (F1 Ch06)
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;    # 600/min
    limit_req_zone $binary_remote_addr zone=web_per_ip:10m rate=5r/s;     # 300/min

    # Security headers (applied globally)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # API upstream
    upstream api_backend {
        server backend:8000;
    }

    # Web frontend upstream
    upstream web_frontend {
        server web:80;
    }

    # HTTP → HTTPS redirect (staging)
    server {
        listen 80;
        server_name staging-api.ecole-platform.example staging.ecole-platform.example;

        # Allow health checks over HTTP
        location /api/v1/health {
            proxy_pass http://api_backend;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API server (staging)
    server {
        listen 443 ssl http2;
        server_name staging-api.ecole-platform.example;

        # TLS — replace with actual certs in deployment
        ssl_certificate     /etc/nginx/ssl/staging.crt;
        ssl_certificate_key /etc/nginx/ssl/staging.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location /api/ {
            limit_req zone=api_per_ip burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
        }

        # Metrics endpoint — internal only
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://api_backend;
        }

        # Health check
        location /api/v1/health {
            proxy_pass http://api_backend;
        }
    }

    # Web frontend (staging)
    server {
        listen 443 ssl http2;
        server_name staging.ecole-platform.example;

        ssl_certificate     /etc/nginx/ssl/staging.crt;
        ssl_certificate_key /etc/nginx/ssl/staging.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # API proxy
        location /api/ {
            limit_req zone=api_per_ip burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static frontend
        location / {
            limit_req zone=web_per_ip burst=30 nodelay;
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
        }
    }
}
