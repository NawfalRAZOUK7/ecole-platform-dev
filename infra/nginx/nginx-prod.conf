# Nginx production configuration — TLS termination + reverse proxy
#
# Reference: Networking, ingress, TLS
# WebSocket, Let's Encrypt cert paths, certbot auto-renew
#
# Rate limits: 120 req/min/user (API), 300 req/min/ip (web), 60/min (auth)
#
# TLS hardening:
#   - TLSv1.2 + TLSv1.3 only
#   - HSTS with 1-year max-age, includeSubDomains, preload
#   - OCSP stapling enabled
#   - Strong cipher suite (ECDHE + AES-GCM + CHACHA20)
#
# Cert paths (Let's Encrypt via certbot):
#   /etc/nginx/ssl/live/<domain>/fullchain.pem
#   /etc/nginx/ssl/live/<domain>/privkey.pem

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_authorization $jwt_rate_key {
        default $binary_remote_addr;
        "~^Bearer\\s+(?<jwt_token>.+)$" $jwt_token;
    }

    # Logging format with correlation ID + request time
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_correlation_id" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Request body limits
    client_max_body_size 25m;
    client_body_buffer_size 128k;

    # Rate limiting zones
    limit_req_zone $jwt_rate_key zone=api_per_user:10m rate=30r/s;          # Per JWT token
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;     # 600/min
    limit_req_zone $binary_remote_addr zone=web_per_ip:10m rate=5r/s;      # 300/min
    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=1r/s;     # 60/min (strict)

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Security headers (applied globally)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hide Nginx version
    server_tokens off;

    include /etc/nginx/conf.d/upstream.conf;

    # Web frontend upstream
    upstream web_frontend {
        server web:3000;
    }

    # HTTP → HTTPS redirect (all traffic)
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API server (production)
    server {
        listen 443 ssl http2;
        server_name api.ecole-platform.example;

        # TLS certificates (replace with real paths)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # TLS hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (1 year, include subdomains)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Connection limits
        limit_conn conn_per_ip 50;

        # Lightweight WAF rules
        if ($query_string ~* "(union(?:\\s+all)?\\s+select|select.+from|insert.+into|update.+set|delete.+from|drop.+table|or\\s+1=1|--|/\\*|\\*/)") {
            return 403;
        }
        if ($request_uri ~* "(<script|javascript:|onerror=|onload=)") {
            return 403;
        }
        if ($request_uri ~* "\\.\\./") {
            return 403;
        }

        location ~ ^/api/v1/(submissions/[0-9a-f-]+/files|assignments/[0-9a-f-]+/exercise-pdf|documents/upload)$ {
            client_max_body_size 50m;
            limit_req zone=api_per_user burst=50 nodelay;
            limit_req zone=api_per_ip burst=20 delay=10;

            proxy_pass http://backend_active;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 120s;
        }

        # API routes
        location /api/ {
            client_max_body_size 1m;
            limit_req zone=api_per_user burst=50 nodelay;
            limit_req zone=api_per_ip burst=20 delay=10;

            proxy_pass http://backend_active;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Pass correlation ID
            proxy_set_header X-Correlation-Id $http_x_correlation_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
        }

        # Auth endpoints (stricter rate limit)
        location ^~ /api/v1/auth/ {
            client_max_body_size 1m;
            limit_req zone=auth_per_ip burst=5 nodelay;

            proxy_pass http://backend_active;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-Correlation-Id $http_x_correlation_id;
        }

        # WebSocket endpoint
        location /api/v1/ws {
            proxy_pass http://backend_active;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived connection timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Metrics endpoint (internal only — restrict in production)
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://backend_active;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # Health check (no rate limit)
        location /api/v1/health {
            proxy_pass http://backend_active;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # Block common attack paths
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~* \.(php|asp|aspx|jsp)$ {
            deny all;
            return 404;
        }
    }

    # Web frontend server (production)
    server {
        listen 443 ssl http2;
        server_name ecole-platform.example;

        # TLS certificates (same or wildcard cert)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # TLS hardening (same as API)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Connection limits
        limit_conn conn_per_ip 50;

        # Serve static files
        location / {
            limit_req zone=web_per_ip burst=30 nodelay;

            proxy_pass http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Block common attack paths
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
