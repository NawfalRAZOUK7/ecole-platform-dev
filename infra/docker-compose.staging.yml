# Staging Environment — École Platform
#
# Reference: Staging environment, environment topology
# Stage deployment with managed-like services, anonymized data, TLS.
#
# URLs:
#   API: https://staging-api.ecole-platform.example/api/v1
#   Web: https://staging.ecole-platform.example
#
# Usage: docker compose -f infra/docker-compose.staging.yml up -d

services:
  # ==================== PostgreSQL 16 (Stage) ====================
  postgres:
    image: postgres:16-alpine
    container_name: ecole-staging-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ecole_platform_staging}
    # No host-exposed ports in staging — access via pgbouncer only
    expose:
      - "5432"
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # WAL archiving for PITR
      - staging_wal_archive:/var/lib/postgresql/wal_archive
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=cp %p /var/lib/postgresql/wal_archive/%f"
      - "-c"
      - "max_wal_senders=3"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-ecole_platform_staging}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecole-staging-network
    restart: unless-stopped

  # ==================== PgBouncer (Stage) ====================
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: ecole-staging-pgbouncer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ecole_platform_staging}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 50
      MAX_CLIENT_CONN: 200
      MAX_DB_CONNECTIONS: 50
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      STATS_PERIOD: 60
    expose:
      - "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecole-staging-network
    restart: unless-stopped

  # ==================== Redis 7 (Stage) ====================
  redis:
    image: redis:7-alpine
    container_name: ecole-staging-redis
    expose:
      - "6379"
    volumes:
      - staging_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecole-staging-network
    restart: unless-stopped

  # ==================== FastAPI Backend (Stage) ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: ecole-staging-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-ecole_platform_staging}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-2}
      APP_ENV: staging
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS:-https://staging.ecole-platform.example}
      ENABLE_TRACING: "true"
      ENABLE_STRICT_RATE_LIMIT: "false"
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@ecole-platform.ma}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-École Platform (Staging)}
      TOTP_ISSUER: ${TOTP_ISSUER:-EcolePlatformStaging}
      UPLOAD_DIR: /app/uploads
      TZ: ${TZ:-Africa/Casablanca}
      # ---- Object Storage (staging uses managed S3 / MinIO instance) -----
      # Set STORAGE_BACKEND=s3 and DOCUMENT_STORAGE_BACKEND=s3 once
      # the storage backend code is deployed.  Secrets must be injected
      # via CI/CD environment or a secrets manager — never committed here.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-ecole-staging-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-local}
      DOCUMENT_STORAGE_ENDPOINT: ${S3_ENDPOINT}
      DOCUMENT_STORAGE_BUCKET: ${S3_BUCKET:-ecole-staging-private}
      DOCUMENT_STORAGE_REGION: ${S3_REGION:-us-east-1}
      DOCUMENT_STORAGE_ACCESS_KEY: ${S3_ACCESS_KEY}
      DOCUMENT_STORAGE_SECRET_KEY: ${S3_SECRET_KEY}
      DOCUMENT_STORAGE_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    expose:
      - "8000"
    # uploads/ is stored in MinIO (STORAGE_BACKEND=s3). No local volume mount needed.
    # If you temporarily switch back to STORAGE_BACKEND=local, re-add:
    #   volumes:
    #     - staging_uploads:/app/uploads  (and restore staging_uploads in top-level volumes)
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import httpx; httpx.get(''http://localhost:8000/api/v1/health'').raise_for_status()"',
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - ecole-staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ==================== ARQ Background Worker (Stage) ====================
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: ecole-staging-worker
    command: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-ecole_platform_staging}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      APP_ENV: staging
      LOG_LEVEL: INFO
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      TZ: ${TZ:-Africa/Casablanca}
      # ---- Object Storage (staging worker) --------------------------------
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET:-ecole-staging-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-local}
      DOCUMENT_STORAGE_ENDPOINT: ${S3_ENDPOINT}
      DOCUMENT_STORAGE_BUCKET: ${S3_BUCKET:-ecole-staging-private}
      DOCUMENT_STORAGE_REGION: ${S3_REGION:-us-east-1}
      DOCUMENT_STORAGE_ACCESS_KEY: ${S3_ACCESS_KEY}
      DOCUMENT_STORAGE_SECRET_KEY: ${S3_SECRET_KEY}
      DOCUMENT_STORAGE_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Web Frontend (Stage) ====================
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      target: production
    container_name: ecole-staging-web
    networks:
      - ecole-staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Nginx Reverse Proxy (Stage) ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: ecole-staging-nginx
    volumes:
      - ./nginx/nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - web
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ecole-staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  staging_postgres_data:
  staging_redis_data:
  staging_wal_archive:
  # staging_uploads volume removed — cleanup complete (grace period elapsed).
  # The Docker volume may still exist on the host; remove it only after confirming
  # the archive is intact:  docker volume rm ecole-platform-dev_staging_uploads

networks:
  ecole-staging-network:
    driver: bridge
