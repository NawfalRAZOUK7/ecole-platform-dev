# École Platform — Redis Configuration
# Reference: Pack D3 — Runtime Configuration

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Networking
bind 0.0.0.0
protected-mode no
tcp-keepalive 60
timeout 0

# Logging
loglevel notice
