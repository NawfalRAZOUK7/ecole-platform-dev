# École Platform — Redis Configuration
# Reference: Pack D3 — Runtime Configuration

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Networking
# Dockerized Redis must bind the container interface; host exposure is restricted in compose.
bind 0.0.0.0
protected-mode yes
# Placeholder overridden by compose command with the real REDIS_PASSWORD value.
requirepass change-me-override-in-compose
tcp-keepalive 60
timeout 0

# Logging
loglevel notice
