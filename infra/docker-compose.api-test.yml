services:
  postgres:
    image: postgres:16-alpine
    container_name: ecole-api-test-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ecole_platform_api_test
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-change-me-app-user}
      APP_READONLY_PASSWORD: ${APP_READONLY_PASSWORD:-change-me-readonly}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - api_test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ecole} -d ecole_platform_api_test",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecole-api-test-network

  redis:
    image: redis:7-alpine
    container_name: ecole-api-test-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-dev-redis}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - api_test_redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - /bin/sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecole-api-test-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: ecole-api-test-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecole}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/ecole_platform_api_test
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-dev-redis}@redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-a-strong-random-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-2}
      APP_ENV: test
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@ecole-platform.ma}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Ecole Platform}
      STORAGE_BACKEND: local
      DOCUMENT_STORAGE_BACKEND: local
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
      - ../backend/tests:/app/tests
      - ../backend/scripts:/app/scripts
      - ../backend/docs:/app/docs
      - api_test_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecole-api-test-network

volumes:
  api_test_postgres_data:
  api_test_redis_data:
  api_test_uploads:

networks:
  ecole-api-test-network:
    driver: bridge
