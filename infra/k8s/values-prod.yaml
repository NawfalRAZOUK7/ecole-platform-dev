# Production environment overrides

global:
  domain: ecole-platform.example
  tlsSecret: ecole-prod-tls

backend:
  replicas: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  env:
    APP_ENV: production
    LOG_LEVEL: WARNING
    CORS_ORIGINS: "https://ecole-platform.example"
    ENABLE_TRACING: "true"
    ENABLE_STRICT_RATE_LIMIT: "true"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

web:
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

pdb:
  enabled: true
  minAvailable: 1
