# External secrets references — these must be pre-created in the cluster
# via ExternalSecrets operator, sealed-secrets, or manually.
#
# Required secrets:
#   {{ .Values.backend.secrets.databaseUrl }} — key: DATABASE_URL
#   {{ .Values.backend.secrets.redisUrl }}    — key: REDIS_URL
#   {{ .Values.backend.secrets.jwtSecretKey }} — key: JWT_SECRET_KEY
#   {{ .Values.backend.secrets.smtpPassword }} — key: SMTP_PASSWORD
#
# This file documents the expected secrets. Create them before deploying:
#
#   kubectl create secret generic ecole-database-url \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://user:pass@host:5432/ecole'
#
#   kubectl create secret generic ecole-redis-url \
#     --from-literal=REDIS_URL='redis://:password@host:6379/0'
#
#   kubectl create secret generic ecole-jwt-secret \
#     --from-literal=JWT_SECRET_KEY='your-256-bit-secret'
#
#   kubectl create secret generic ecole-smtp-password \
#     --from-literal=SMTP_PASSWORD='your-smtp-password'
