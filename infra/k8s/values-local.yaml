# Local development environment overrides for Docker Desktop Kubernetes
# Usage: helm upgrade --install ecole-platform ./infra/k8s -n ecole-local -f values-local.yaml

# ---------------------------------------------------------------------------
# Global
# ---------------------------------------------------------------------------
global:
  domain: localhost
  tlsSecret: "" # No TLS for local development

# ---------------------------------------------------------------------------
# Container images — use local builds
# ---------------------------------------------------------------------------
images:
  backend:
    repository: ecole-platform-backend
    tag: local
    pullPolicy: Never # Images pre-loaded via kind load
  web:
    repository: ecole-platform-web
    tag: local
    pullPolicy: Never

imagePullSecrets: []

# ---------------------------------------------------------------------------
# Namespace management
# ---------------------------------------------------------------------------
namespace:
  create: false
  name: default

# ---------------------------------------------------------------------------
# Backend (FastAPI)
# ---------------------------------------------------------------------------
backend:
  replicas: 1
  port: 8000
  hpa:
    enabled: false # No HPA for single-node local cluster
  env:
    APP_ENV: development
    LOG_LEVEL: DEBUG
    CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8000"
    ENABLE_TRACING: "false"
    ENABLE_STRICT_RATE_LIMIT: "false"
    UPLOAD_DIR: /app/uploads
    MAX_FILE_SIZE_MB: "50"
    TOTP_ISSUER: EcolePlatform
    TZ: Africa/Casablanca
    JWT_ALGORITHM: HS256
    ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    REFRESH_TOKEN_EXPIRE_DAYS: "7"
  # Secret references — these must exist in the cluster
  secrets:
    databaseUrl: ecole-database-url
    redisUrl: ecole-redis-url
    jwtSecretKey: ecole-jwt-secret
    smtpPassword: ecole-smtp-password
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Worker (ARQ background tasks)
# ---------------------------------------------------------------------------
worker:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Web (React SPA served by nginx)
# ---------------------------------------------------------------------------
web:
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 64Mi

# ---------------------------------------------------------------------------
# Ingress — disabled for local, use port-forward instead
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# Pod Disruption Budget — disabled for single-node local cluster
# ---------------------------------------------------------------------------
pdb:
  enabled: false

# ---------------------------------------------------------------------------
# External services — point to local docker-compose
# ---------------------------------------------------------------------------
# PostgreSQL: connection via DATABASE_URL secret (host.docker.internal:5432)
# Redis: connection via REDIS_URL secret (host.docker.internal:6379)
