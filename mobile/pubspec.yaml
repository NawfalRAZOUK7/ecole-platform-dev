name: ecole_platform
description: "École Platform — Mobile app for K-12 schools"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  sqflite: ^2.4.1
  flutter_secure_storage: ^9.2.3
  firebase_messaging: ^15.1.5
  firebase_core: ^3.8.1
  intl: ^0.20.2
  fl_chart: ^0.69.2
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  uuid: ^4.5.1
  # Phase 5A — Biometric auth, file picker, WebSocket, local notifications
  local_auth: ^2.3.0
  device_info_plus: ^11.2.0
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  web_socket_channel: ^3.0.2
  flutter_local_notifications: ^18.0.1
  flutter_app_badger: ^1.5.0
  open_filex: ^4.5.0
  share_plus: ^10.1.2
  table_calendar: ^3.1.2
  device_calendar: ^4.3.3
  pdf_render:
    path: third_party/pdf_render

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
