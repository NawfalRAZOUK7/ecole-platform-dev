name: ecole_platform
description: "École Platform — Mobile app for K-12 schools"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  sqflite: ^2.4.1
  flutter_secure_storage:
    path: third_party/flutter_secure_storage
  firebase_messaging: ^15.1.5
  firebase_core: ^3.8.1
  intl: ^0.20.2
  fl_chart: ^0.69.2
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  uuid: ^4.5.1
  # Phase 5A — Biometric auth, file picker, WebSocket, local notifications
  local_auth: ^2.3.0
  device_info_plus: ^11.2.0
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  web_socket_channel: ^3.0.2
  flutter_local_notifications:
    path: third_party/flutter_local_notifications
  flutter_app_badger:
    path: third_party/flutter_app_badger
  open_filex: ^4.5.0
  share_plus: ^10.1.2
  table_calendar: ^3.1.2
  device_calendar:
    path: third_party/device_calendar
  pdf_render:
    path: third_party/pdf_render
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.4+4

flutter:
  uses-material-design: true

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
          weight: 700
